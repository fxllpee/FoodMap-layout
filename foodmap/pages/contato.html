<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoodMap — Central de Atendimento</title>

  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/footer.css" />
  <link rel="stylesheet" href="../css/contato.css" />
</head>
<body>

  <div id="navbar"></div>

  <main>

    <!-- ── Hero ── -->
    <section class="section-sm" style="background-color: var(--color-surface-container-low);">
      <div class="container">
        <h1 class="display-lg" style="margin-bottom: var(--space-md);">Central de Atendimento</h1>
        <p class="body-lg text-muted">Tem alguma dúvida, quer ser parceiro ou precisa de suporte? Fale com a gente.</p>
      </div>
    </section>

    <!-- ── Layout principal ── -->
    <section class="section">
      <div class="container">
        <div class="contato-layout">

          <!-- Cards de contato + ODS -->
          <div class="contato-cards" id="contatoCards">
            <!-- preenchido pelo contato.js -->
          </div>

          <!-- Formulário -->
          <div class="card contato-form-wrapper">
            <h2 class="headline-md" style="margin-bottom: var(--space-xl);">Envie uma mensagem</h2>

            <form id="contatoForm" novalidate>

              <div class="form-field">
                <label class="input-label" for="name">Nome completo</label>
                <input class="input" type="text" id="name" name="name" placeholder="Seu nome" required />
              </div>

              <div class="form-row">
                <div class="form-field">
                  <label class="input-label" for="email">E-mail</label>
                  <input class="input" type="email" id="email" name="email" placeholder="seu@email.com" required />
                </div>
                <div class="form-field">
                  <label class="input-label" for="phone">Telefone (opcional)</label>
                  <input class="input" type="tel" id="phone" name="phone" placeholder="(11) 99999-9999" />
                </div>
              </div>

              <div class="form-field">
                <label class="input-label" for="subject">Assunto</label>
                <select class="input" id="subject" name="subject" required>
                  <option value="" disabled selected>Selecione um assunto</option>
                  <option value="parceria">Quero ser parceiro</option>
                  <option value="doacao">Quero fazer doações</option>
                  <option value="voluntariado">Quero ser voluntário</option>
                  <option value="imprensa">Imprensa / Mídia</option>
                  <option value="suporte">Suporte técnico</option>
                  <option value="outro">Outro</option>
                </select>
              </div>

              <div class="form-field">
                <label class="input-label" for="message">Mensagem</label>
                <textarea class="input" id="message" name="message" rows="5" placeholder="Conte mais sobre o que você precisa..." required style="padding-top: 12px; resize: vertical;"></textarea>
              </div>

              <div class="form-checkbox">
                <input type="checkbox" id="privacy" name="privacy" required />
                <label for="privacy" class="label-md text-muted">
                  Concordo com a <a href="#" class="text-primary">Política de Privacidade</a> do FoodMap.
                </label>
              </div>

              <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--space-lg);">
                Enviar mensagem
              </button>

              <p id="formMsg" class="label-md text-center" style="margin-top: var(--space-md); display: none;"></p>

            </form>
          </div>

        </div>
      </div>
    </section>

    <!-- ── FAQ ── -->
    <section class="section" style="background-color: var(--color-surface-container-low);">
      <div class="container" style="max-width: 720px;">
        <h2 class="headline-lg text-center" style="margin-bottom: var(--space-xxl);">Perguntas frequentes</h2>
        <div class="faq-list" id="faqList">
          <!-- preenchido pelo contato.js -->
        </div>
      </div>
    </section>

  </main>

  <div id="footer"></div>

  <script src="../components/navbar.js"></script>
  <script src="../components/footer.js"></script>
  <script src="../js/contato.js"></script>
  <script>
    NavBar.render('contato');
    Footer.render();
    Contato.render();
  </script>

</body>
</html>
